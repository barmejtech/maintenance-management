<div class="auth-container">
  <button class="btn-lang-toggle" (click)="translation.toggleLanguage()" title="Switch Language">
    <i class="bi bi-globe2"></i> {{ 'lang.toggle' | translate }}
  </button>
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">🔧</div>
      <h1>MaintenancePro</h1>
      <h2>{{ 'register.title' | translate }}</h2>
    </div>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label>{{ 'register.firstName' | translate }}</label>
          <input type="text" formControlName="firstName" [placeholder]="'register.firstNamePlaceholder' | translate" />
        </div>
        <div class="form-group">
          <label>{{ 'register.lastName' | translate }}</label>
          <input type="text" formControlName="lastName" [placeholder]="'register.lastNamePlaceholder' | translate" />
        </div>
      </div>
      <div class="form-group">
        <label>{{ 'register.emailLabel' | translate }}</label>
        <input type="email" formControlName="email" [placeholder]="'register.emailPlaceholder' | translate" />
      </div>
      <div class="form-group">
        <label>{{ 'register.roleLabel' | translate }}</label>
        <select formControlName="role">
          @for (r of roles; track r) {
            <option [value]="r">{{ 'register.role.' + r.toLowerCase() | translate }}</option>
          }
        </select>
      </div>
      <div class="form-group">
        <label>{{ 'register.passwordLabel' | translate }}</label>
        <input type="password" formControlName="password" [placeholder]="'register.passwordPlaceholder' | translate" />
      </div>
      <div class="form-group">
        <label>{{ 'register.confirmPasswordLabel' | translate }}</label>
        <input type="password" formControlName="confirmPassword" [placeholder]="'register.confirmPasswordPlaceholder' | translate" />
        @if (form.hasError('passwordMismatch') && form.get('confirmPassword')?.touched) {
          <span class="error">{{ 'register.passwordMismatch' | translate }}</span>
        }
      </div>
      @if (errorMessage()) {
        <div class="alert-error">{{ errorMessage() }}</div>
      }
      <button type="submit" [disabled]="form.invalid || isLoading()" class="btn-primary">
        {{ isLoading() ? ('register.creating' | translate) : ('register.submit' | translate) }}
      </button>
    </form>
  </div>
  <a routerLink="/home" class="auth-home-link">{{ 'register.backToHome' | translate }}</a>
</div>
