<div class="page-container">
  <div class="page-header">
    <h2>👥 Technician Groups</h2>
    <div class="header-actions">
      <button class="btn-add" (click)="openAdd()">➕ Add Group</button>
      <a routerLink="/dashboard" class="btn-back">← Dashboard</a>
    </div>
  </div>
  <div class="card-grid">
    @for (group of groups(); track group.id) {
      <div class="group-card">
        <div class="group-icon">👥</div>
        <h3>{{ group.name }}</h3>
        <p>{{ group.description }}</p>
        <div class="member-count">{{ group.memberCount }} members</div>
        <div class="card-actions">
          <button class="btn-icon btn-edit" (click)="openEdit(group)" title="Edit">✏️</button>
          <button class="btn-icon btn-delete" (click)="delete(group.id)" title="Delete">🗑️</button>
        </div>
      </div>
    }
    @empty {
      <div class="empty-state">No groups found.</div>
    }
  </div>
</div>

@if (showModal()) {
  <div class="modal-overlay" (click)="closeModal()">
    <div class="modal" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h3>{{ isEditing() ? 'Edit Group' : 'Add Group' }}</h3>
        <button class="modal-close" (click)="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Name *</label>
          <input [(ngModel)]="form.name" placeholder="Group name" class="form-control" />
        </div>
        <div class="form-group" style="margin-top:1rem">
          <label>Description</label>
          <textarea [(ngModel)]="form.description" placeholder="Description" class="form-control" rows="3"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" (click)="closeModal()">Cancel</button>
        <button class="btn-save" (click)="save()" [disabled]="isSaving() || !form.name">
          {{ isSaving() ? 'Saving...' : (isEditing() ? 'Update' : 'Create') }}
        </button>
      </div>
    </div>
  </div>
}
