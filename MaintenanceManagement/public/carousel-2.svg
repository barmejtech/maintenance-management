<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a472a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2137;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#27ae60;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2ecc71;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="500" fill="url(#bg2)"/>
  <!-- Circles decoration -->
  <circle cx="1050" cy="250" r="200" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="60"/>
  <circle cx="1050" cy="250" r="120" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="30"/>
  <circle cx="1050" cy="250" r="50" fill="rgba(255,255,255,0.05)"/>
  <!-- Tool icons (simplified) -->
  <g transform="translate(870, 80)" opacity="0.18">
    <!-- Clipboard/task board -->
    <rect x="0" y="0" width="160" height="200" rx="12" fill="white"/>
    <rect x="55" y="-15" width="50" height="30" rx="8" fill="white" stroke="#1a472a" stroke-width="4"/>
    <rect x="20" y="50" width="120" height="12" rx="4" fill="#ccc"/>
    <rect x="20" y="80" width="90" height="12" rx="4" fill="#ccc"/>
    <rect x="20" y="110" width="110" height="12" rx="4" fill="#ccc"/>
    <rect x="20" y="140" width="70" height="12" rx="4" fill="#ccc"/>
    <rect x="20" y="50" width="12" height="12" rx="2" fill="#27ae60"/>
    <rect x="20" y="80" width="12" height="12" rx="2" fill="#27ae60"/>
    <rect x="20" y="110" width="12" height="12" rx="2" fill="#f39c12"/>
    <rect x="20" y="140" width="12" height="12" rx="2" fill="#e74c3c"/>
  </g>
  <!-- Main text -->
  <text x="120" y="160" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white">Preventive</text>
  <text x="120" y="220" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white">Maintenance Scheduling</text>
  <rect x="120" y="242" width="200" height="5" rx="2" fill="url(#accent2)"/>
  <text x="120" y="300" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.85)">Schedule, track, and complete maintenance tasks</text>
  <text x="120" y="335" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.85)">before equipment failures occur</text>
  <!-- Feature bullets -->
  <g transform="translate(120, 375)">
    <circle cx="10" cy="10" r="10" fill="url(#accent2)"/>
    <text x="30" y="16" font-family="Arial" font-size="16" fill="rgba(255,255,255,0.9)">Automated task assignments</text>
    <g transform="translate(320, 0)">
      <circle cx="10" cy="10" r="10" fill="url(#accent2)"/>
      <text x="30" y="16" font-family="Arial" font-size="16" fill="rgba(255,255,255,0.9)">Real-time notifications</text>
    </g>
    <g transform="translate(620, 0)">
      <circle cx="10" cy="10" r="10" fill="url(#accent2)"/>
      <text x="30" y="16" font-family="Arial" font-size="16" fill="rgba(255,255,255,0.9)">Priority-based workflows</text>
    </g>
  </g>
  <g transform="translate(120, 415)">
    <circle cx="10" cy="10" r="10" fill="url(#accent2)"/>
    <text x="30" y="16" font-family="Arial" font-size="16" fill="rgba(255,255,255,0.9)">Equipment lifecycle tracking</text>
    <g transform="translate(320, 0)">
      <circle cx="10" cy="10" r="10" fill="url(#accent2)"/>
      <text x="30" y="16" font-family="Arial" font-size="16" fill="rgba(255,255,255,0.9)">Detailed analytics &amp; reports</text>
    </g>
  </g>
</svg>
