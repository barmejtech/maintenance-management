<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a1060;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3498db;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="500" fill="url(#bg3)"/>
  <!-- Decorative elements -->
  <circle cx="100" cy="450" r="250" fill="rgba(155,89,182,0.08)"/>
  <circle cx="1150" cy="80" r="180" fill="rgba(52,152,219,0.08)"/>
  <!-- Dashboard mockup on right -->
  <g transform="translate(680, 40)" opacity="0.22">
    <rect width="460" height="380" rx="14" fill="white"/>
    <!-- Header bar -->
    <rect width="460" height="50" rx="14" fill="#4a1060"/>
    <rect y="36" width="460" height="14" fill="#4a1060"/>
    <circle cx="30" cy="25" r="8" fill="rgba(255,255,255,0.3)"/>
    <rect x="55" y="18" width="120" height="14" rx="4" fill="rgba(255,255,255,0.4)"/>
    <!-- Stat cards -->
    <rect x="20" y="70" width="90" height="65" rx="8" fill="#f0f4ff"/>
    <text x="65" y="110" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#0f3460">24</text>
    <text x="65" y="127" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">Tasks</text>
    <rect x="125" y="70" width="90" height="65" rx="8" fill="#f0fff4"/>
    <text x="170" y="110" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#27ae60">18</text>
    <text x="170" y="127" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">Technicians</text>
    <rect x="230" y="70" width="90" height="65" rx="8" fill="#fff8f0"/>
    <text x="275" y="110" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#f39c12">7</text>
    <text x="275" y="127" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">Pending</text>
    <rect x="335" y="70" width="90" height="65" rx="8" fill="#fdf0f0"/>
    <text x="380" y="110" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#e74c3c">3</text>
    <text x="380" y="127" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">Overdue</text>
    <!-- Chart placeholder -->
    <rect x="20" y="150" width="200" height="140" rx="8" fill="#f8f9fa"/>
    <circle cx="120" cy="220" r="55" fill="none" stroke="#0f3460" stroke-width="24"/>
    <circle cx="120" cy="220" r="55" fill="none" stroke="#27ae60" stroke-width="24" stroke-dasharray="100 245" stroke-dashoffset="0"/>
    <!-- List placeholder -->
    <rect x="235" y="150" width="200" height="20" rx="4" fill="#e0e6ff"/>
    <rect x="235" y="180" width="200" height="20" rx="4" fill="#e0f0ff"/>
    <rect x="235" y="210" width="200" height="20" rx="4" fill="#fff0e0"/>
    <rect x="235" y="240" width="150" height="20" rx="4" fill="#e0ffe8"/>
    <rect x="235" y="270" width="180" height="20" rx="4" fill="#e0e6ff"/>
    <!-- Footer row -->
    <rect x="20" y="305" width="420" height="60" rx="8" fill="#f4f6f9"/>
    <rect x="30" y="320" width="60" height="30" rx="6" fill="#0f3460"/>
    <rect x="100" y="320" width="60" height="30" rx="6" fill="white" stroke="#e0e0e0"/>
    <rect x="170" y="320" width="60" height="30" rx="6" fill="white" stroke="#e0e0e0"/>
  </g>
  <!-- Main text -->
  <text x="100" y="160" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white">Analytics &amp;</text>
  <text x="100" y="220" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white">Real-Time Insights</text>
  <rect x="100" y="242" width="200" height="5" rx="2" fill="url(#accent3)"/>
  <text x="100" y="300" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.85)">Comprehensive dashboards showing</text>
  <text x="100" y="333" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.85)">KPIs, trends, and team performance</text>
  <text x="100" y="375" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.7)">Make data-driven decisions with instant</text>
  <text x="100" y="403" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.7)">access to your maintenance metrics</text>
  <!-- CTA buttons (visual only) -->
  <rect x="100" y="430" width="160" height="48" rx="24" fill="url(#accent3)"/>
  <text x="180" y="461" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">Get Started</text>
  <rect x="280" y="430" width="160" height="48" rx="24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <text x="360" y="461" text-anchor="middle" font-family="Arial" font-size="16" fill="rgba(255,255,255,0.85)">Learn More</text>
</svg>
