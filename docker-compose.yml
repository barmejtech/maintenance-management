services:
  # ── SQL Server ─────────────────────────────────────────────────
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD environment variable is required}"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Backend (.NET API) ─────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Maintenance-management.api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=db;Database=MaintenanceManage;User Id=sa;Password=${DB_PASSWORD:?DB_PASSWORD environment variable is required};TrustServerCertificate=True"
      JwtSettings__SecretKey: "${JWT_SECRET_KEY:?JWT_SECRET_KEY environment variable is required}"
      JwtSettings__Issuer: "MaintenanceManagementAPI"
      JwtSettings__Audience: "MaintenanceManagementClient"
      JwtSettings__ExpiresInMinutes: "60"
      JwtSettings__RefreshTokenExpiryDays: "7"
      AllowedOrigins__0: "http://localhost"
      AllowedOrigins__1: "http://localhost:4200"
      FrontendUrl: "http://localhost"
    depends_on:
      db:
        condition: service_healthy

  # ── Frontend (Angular + nginx) ─────────────────────────────────
  frontend:
    build:
      context: MaintenanceManagement
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  sqlserver-data:
