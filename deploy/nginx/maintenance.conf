server {
    listen 8090;
    listen [::]:8090;

    root /var/www/maintenance-client/browser;
    index index.html;

    server_name _;

    # Angular SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API
    location /api/ {
        proxy_pass         http://localhost:5002/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Uploaded files / static assets served by the .NET API (wwwroot)
    location /uploads/ {
        proxy_pass         http://localhost:5002/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        expires            7d;
        add_header         Cache-Control "public";
    }

    # SignalR hubs (websocket upgrade)
    location /hubs/ {
        proxy_pass             http://localhost:5002/hubs/;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_cache_bypass     $http_upgrade;
        proxy_read_timeout     86400;
    }
}
