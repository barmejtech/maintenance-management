services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: studies-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Admin@2026"
      MSSQL_PID: "Developer"
    ports:
      - "1434:1433"
    volumes:
      - studies_sqldata:/var/opt/mssql
    restart: unless-stopped

volumes:
  studies_sqldata: